name: CI/CD – Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/shopease-frontend

jobs:
  build-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build
        env:
          VITE_USER_SERVICE_URL: ${{ secrets.USER_SERVICE_URL }}
          VITE_PRODUCT_SERVICE_URL: ${{ secrets.PRODUCT_SERVICE_URL }}
          VITE_ORDER_SERVICE_URL: ${{ secrets.ORDER_SERVICE_URL }}

      - name: Security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: github.event_name == 'push'

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        if: github.event_name == 'push'
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        if: github.event_name == 'push'
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }}
            VITE_PRODUCT_SERVICE_URL=${{ secrets.PRODUCT_SERVICE_URL }}
            VITE_ORDER_SERVICE_URL=${{ secrets.ORDER_SERVICE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
